<style>html, body {background-color: #fcb1e3; margin: 0px;min-height: 700px;width: 100%;height: 100%;width: -webkit-fill-available;height: -webkit-fill-available;} ::backdrop {background: none} dialog {background: #fcb1e3;border-color: #ff0000;border-style: solid;} dialog.message {display: flex;align-items: center;justify-content: center;flex-direction: column; padding-block-start: 0px;} dialog > img[src="https://lepripri.github.io/lepripri/icons/Warning.png"] {width: 1em; height: 1em; display: block} #fileName {height: 20px;border-radius: 30px;border-width: 2px;border-style: solid;border-color: #ff0000;margin: 4px;padding-inline: 9px;padding-block: 0px;}      button[minus], input[type="files"][minus]::file-selector-button:hover, {

        cursor: revert;
        font-size: revert;
        translate: revert;

markdown {
    content {
        display: none;
    }
    display {
        code[notpre] {
            border: 1px solid #ccc;
            background: #f9f9f9;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
        }
        pre {
            background: #f9f9f9;
            font-size: 0px;
            margin-block: 5px;
            div {
                display: flex;
                justify-content: space-between;

                border-block-end-style: solid;

                font-size: initial;

        }
